--- # Run docker image tests
name: 'Run docker image tests'
description: 'Docker image tests'
inputs:
  APP_OWNER:
    description: 'docker app owner'
    required: true
  APP_NAME:
    description: 'docker app name'
    required: true
  GITHUB_TOKEN:
    description: 'github token for accessing github'
    required: true
    default: ${{github.token}}

runs:
  using: "composite"
  steps:
    - name: "Start container"
      shell: bash
      run: |
        docker run -d --rm \
          --name dispatcher-smoke \
          -p 18080:8080 \
          -e Discord__WebhookUrl=http://localhost:1/dummy \
          -e Discord__NotificationsChannelWebhookUrl=http://localhost:1/dummy \
          -e GitHub__Token=smoke-test-dummy \
          "${{inputs.APP_OWNER}}/${{inputs.APP_NAME}}:test"

    - name: "Wait for /priorities to respond"
      shell: bash
      run: |
        for i in $(seq 1 30); do
          STATUS=$(curl --noproxy localhost -s -o /dev/null -w "%{http_code}" http://localhost:18080/priorities 2>/dev/null || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Container healthy after ${i}s"
            exit 0
          fi
          echo "  Attempt ${i}: HTTP $STATUS — waiting..."
          sleep 1
        done
        echo "ERROR: /priorities did not return 200 within 30s"
        docker logs dispatcher-smoke || true
        exit 1

    - name: "Verify /priorities response body"
      shell: bash
      run: |
        BODY=$(curl --noproxy localhost -s http://localhost:18080/priorities)
        if [ "$BODY" != "[]" ]; then
          echo "ERROR: unexpected response body: $BODY"
          exit 1
        fi
        echo "Response: $BODY — PASSED"

    - name: "Stop container"
      if: always()
      shell: bash
      run: docker stop dispatcher-smoke 2>/dev/null || true


services:
  dispatcher-bot:
    container_name: dispatcher-bot
    hostname: dispatcher-bot
    image: docker-registry.markridgwell.com/credfeto/dispatcher-bot:latest
    restart: unless-stopped
    stop_grace_period: 500s
    stop_signal: SIGINT
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./appsettings-local.json:/usr/src/app/appsettings-local.json:r
      - dispatcher-data:/usr/src/app/data

volumes:
  dispatcher-data:
    external: true
    name: dispatcher-data
